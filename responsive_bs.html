<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Column Example</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

    <div class="container">
        <div class="row">
            <!-- This column will take full width on small screens, half on medium, and one-third on large -->
            <div class="col-12 col-md-6 col-lg-4 bg-primary text-white p-3">
                Responsive Column
            </div>
            <div class="col-12 col-md-6 col-lg-8 bg-secondary text-white p-3">
                Another Column
            </div>
        </div>
    </div>

</body>

</html>
