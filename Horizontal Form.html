<!DOCTYPE html>
<html lang="en">

<head>

<body class="bg-light">
    <form action="/action_page.php">
        <div class="form-group">
            <label for="email">Email address:</label>

        </div>
        <div class="form-group">
            <label for="pwd">Password:</label>
            <input type="password" class="form-control" id="pwd">
